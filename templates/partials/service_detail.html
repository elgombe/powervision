<div class="detail-panel fu">
  <div class="columns is-vcentered is-variable is-6">
    <div class="column is-6">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem">
        <div style="width:44px;height:44px;background:var(--blue-pale);border:1px solid rgba(37,99,235,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="bi {{ service.icon }}" style="font-size:1.4rem;color:var(--navy-2);transition:transform 0.3s"
             onmouseover="this.style.transform='scale(1.2) rotate(-8deg)'"
             onmouseout="this.style.transform='scale(1) rotate(0)'"></i>
        </div>
        <h3 style="font-family:var(--font-display);font-weight:600;font-size:1.5rem;color:var(--navy);line-height:1.1">{{ service.title }}</h3>
      </div>
      <p style="color:var(--text);line-height:1.8;margin-bottom:1rem;font-size:0.9rem">{{ service.description[:300] }}...</p>
      <a href="/products-services/{{ service.slug }}" class="btn-primary" style="font-size:0.78rem;padding:0.65rem 1.5rem">
        <i class="bi bi-arrow-right"></i> Full Details
      </a>
    </div>
    <div class="column is-6">
      <p style="font-weight:700;font-size:0.70rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--navy-2);margin-bottom:0.75rem">
        <i class="bi bi-list-check"></i> Scope &amp; Features
      </p>
      <ul class="feat-list visible">
        {% for f in service.features[:5] %}
        <li><i class="bi bi-check-circle-fill"></i> {{ f }}</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
